name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: |
          node --check rppg.js
          node --check heatmap.js
          node --check app.js
      - name: rPPG core test (accuracy, stability, FPS-correctness)
        run: node rppg.test.js
